services:
  postgres:
    image: postgres:latest
    container_name: postgres_db
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: e_board
      PGDATA: /pgdata
    ports:
      - "5432:5432"
    volumes:
      - ./pgdata:/pgdata

volumes:
  pgdata:
    driver: local